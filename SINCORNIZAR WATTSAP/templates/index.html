<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Tech Classifier & Backup</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glass-container">
        <!-- Sidebar / Header -->
        <header class="dashboard-header">
            <div class="brand">
                <i class="fa-brands fa-whatsapp icon-logo"></i>
                <div class="brand-text">
                    <h1>WhatsApp Classifier</h1>
                    <span>Sincronizado con GitHub</span>
                </div>
            </div>
            
            <div class="ip-info" id="ip-info-box">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <div>
                    <small>Acceso Móvil:</small>
                    <strong id="ip-address">Cargando...</strong>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fa-solid fa-comments"></i>
                </div>
                <div class="stat-details">
                    <h3 id="stat-total">0</h3>
                    <p>Mensajes Totales</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <div class="stat-details">
                    <h3 id="stat-last-update">--:--</h3>
                    <p>Última Actualización</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fa-brands fa-github"></i>
                </div>
                <div class="stat-details">
                    <h3 id="stat-git-status">Sin Verificar</h3>
                    <p>Respaldo en GitHub</p>
                </div>
            </div>
        </section>

        <!-- Main Dashboard Content -->
        <main class="dashboard-main">
            <!-- Visualizations Panel -->
            <section class="chart-section card">
                <h2><i class="fa-solid fa-chart-pie"></i> Distribución de Categorías</h2>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </section>

            <!-- Interactive Messages Panel -->
            <section class="messages-section card">
                <div class="section-header">
                    <h2><i class="fa-solid fa-list-check"></i> Mensajes Clasificados</h2>
                    <div class="header-actions">
                        <div class="category-creator">
                            <input type="text" id="new-category-input" placeholder="Nueva categoría..." class="input-category">
                            <button onclick="createCategory()" class="btn-secondary btn-icon-only" title="Crear Categoría">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                        <button id="btn-import" class="btn-secondary">
                            <i class="fa-solid fa-file-import"></i> Importar Historial (.txt)
                        </button>
                        <input type="file" id="file-import" accept=".txt" style="display: none;">
                        <button id="btn-update" class="btn-primary">
                            <i class="fa-solid fa-arrows-rotate"></i> Actualizar Ahora
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filter-bar" id="filter-buttons-container">
                    <button class="filter-btn active" data-category="all" onclick="selectFilter('all', this)">Todos</button>
                    <!-- Las categorías se cargarán aquí dinámicamente -->
                </div>

                <!-- Messages Feed -->
                <div class="messages-feed" id="messages-container">
                    <!-- Loading state -->
                    <div class="loading-state">
                        <i class="fa-solid fa-spinner fa-spin"></i> Cargando mensajes...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Alert System -->
    <div id="toast-container"></div>

    <!-- Script Logic -->
    <script>
        let messagesData = [];
        let globalCategories = [];
        let activeCategory = 'all';
        let categoryChart = null;

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories().then(() => {
                fetchData();
            });
            
            // Set up update button
            document.getElementById('btn-update').addEventListener('click', runUpdate);
            
            // Set up import file triggers
            document.getElementById('btn-import').addEventListener('click', () => {
                document.getElementById('file-import').click();
            });
            
            document.getElementById('file-import').addEventListener('change', handleFileImport);
        });

        // Load Categories from API
        function loadCategories() {
            return fetch('/api/categories')
                .then(res => res.json())
                .then(cats => {
                    globalCategories = cats;
                    renderFilterButtons();
                })
                .catch(err => {
                    console.error('Error loading categories:', err);
                    showToast('Error al cargar categorías', 'error');
                });
        }

        // Render Filter Buttons dynamically
        function renderFilterButtons() {
            const container = document.getElementById('filter-buttons-container');
            container.innerHTML = `<button class="filter-btn ${activeCategory === 'all' ? 'active' : ''}" data-category="all" onclick="selectFilter('all', this)">Todos</button>`;
            
            globalCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${activeCategory === cat ? 'active' : ''}`;
                btn.setAttribute('data-category', cat);
                btn.textContent = cat;
                btn.onclick = () => selectFilter(cat, btn);
                container.appendChild(btn);
            });
        }

        // Handle Filter Click
        function selectFilter(category, element) {
            activeCategory = category;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            filterMessages(category);
        }

        // Create Custom Category
        function createCategory() {
            const input = document.getElementById('new-category-input');
            const name = input.value.trim();
            if (!name) {
                showToast('Escribe un nombre de categoría válido', 'warning');
                return;
            }

            fetch('/api/categories/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast(`Categoría "${name}" creada con éxito`, 'success');
                    input.value = '';
                    loadCategories().then(() => {
                        fetchData(); // Reload stats and chart with new categories
                    });
                } else {
                    showToast('Error al crear categoría: ' + data.error, 'error');
                }
            })
            .catch(err => {
                showToast('Error de red al crear categoría', 'error');
            });
        }

        // Handle Chat Import File
        function handleFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const btn = document.getElementById('btn-import');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Procesando...`;
            
            showToast('Subiendo y procesando archivo de chat...', 'info');
            
            fetch('/api/messages/import', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                e.target.value = ''; // Reset file input
                
                if (data.success) {
                    if (data.count > 0) {
                        showToast(`Importación exitosa. Se agregaron ${data.count} mensajes nuevos (Total: ${data.total}).`, 'success');
                    } else {
                        showToast(`El archivo no contiene nuevos mensajes (Total actual: ${data.total}).`, 'warning');
                    }
                    fetchData(); // Reload data
                } else {
                    showToast('Error al importar chat: ' + data.error, 'error');
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                e.target.value = '';
                showToast('Error de red al subir el archivo', 'error');
            });
        }

        // Toast Alert System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            if (type === 'warning') icon = 'fa-exclamation-triangle';

            toast.innerHTML = `
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('show');
            }, 100);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Fetch Data from Server
        function fetchData() {
            fetch('/api/messages')
                .then(res => res.json())
                .then(data => {
                    messagesData = data.messages || [];
                    
                    // Update metadata stats
                    document.getElementById('stat-total').textContent = messagesData.length;
                    document.getElementById('stat-last-update').textContent = data.last_update || 'Nunca';
                    
                    const gitStatus = document.getElementById('stat-git-status');
                    gitStatus.textContent = data.git_backup || 'Completado';
                    if (data.git_backup === 'Completado') {
                        gitStatus.className = 'status-green';
                    } else if (data.git_backup === 'Fallido') {
                        gitStatus.className = 'status-red';
                    }

                    // Set IP Address
                    document.getElementById('ip-address').textContent = `http://${data.ip_address}:5000`;

                    // Render chart and feed
                    updateChart(messagesData);
                    filterMessages('all');
                })
                .catch(err => {
                    console.error('Error fetching data:', err);
                    showToast('Error al conectar con el servidor', 'error');
                });
        }

        // Filter and Render Messages
        function filterMessages(category) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';

            const filtered = category === 'all' 
                ? messagesData 
                : messagesData.filter(m => m.category === category);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>No hay mensajes en esta categoría.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';
                
                // Format links in text
                const formattedText = formatLinks(msg.text);

                // Options for categories dropdown
                const optionsHtml = globalCategories.map(cat => 
                    `<option value="${cat}" ${msg.category === cat ? 'selected' : ''}>${cat}</option>`
                ).join('');

                card.innerHTML = `
                    <div class="message-meta">
                        <span class="sender"><i class="fa-solid fa-user"></i> ${msg.sender}</span>
                        <span class="time"><i class="fa-solid fa-clock"></i> ${msg.timestamp || 'Sin fecha'}</span>
                    </div>
                    <div class="message-body">${formattedText}</div>
                    <div class="message-actions">
                        <div class="category-selector">
                            <label><i class="fa-solid fa-tag"></i> Categoría:</label>
                            <select onchange="updateMessageCategory('${msg.data_id}', this.value)">
                                ${optionsHtml}
                            </select>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Auto-link URLs
        function formatLinks(text) {
            if (!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" class="chat-link"><i class="fa-solid fa-link"></i> Enlace <i class="fa-solid fa-up-right-from-square small-icon"></i></a>`;
            }).replace(/\n/g, '<br>');
        }

        // Update Category on Backend
        function updateMessageCategory(dataId, newCategory) {
            fetch('/api/messages/update_category', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data_id: dataId, category: newCategory })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast('Categoría actualizada con éxito', 'success');
                    // Update local data and chart
                    const msg = messagesData.find(m => m.data_id === dataId);
                    if (msg) msg.category = newCategory;
                    updateChart(messagesData);
                    
                    // Update GitHub Status card
                    const gitStatus = document.getElementById('stat-git-status');
                    gitStatus.textContent = data.git_backup;
                    gitStatus.className = data.git_backup === 'Completado' ? 'status-green' : 'status-red';
                } else {
                    showToast('Error al guardar categoría: ' + data.error, 'error');
                }
            })
            .catch(err => {
                showToast('Error de red al actualizar la categoría', 'error');
            });
        }

        // Trigger WhatsApp Scraper update
        function runUpdate() {
            const btn = document.getElementById('btn-update');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Actualizando...`;
            showToast('Navegador abierto. Desplázate por el chat de WhatsApp para cargar mensajes históricos. La página web se actualizará automáticamente en tiempo real. Cierra el navegador de WhatsApp al terminar.', 'info');

            // Iniciar consulta periódica (cada 3 segundos) para actualizar el dashboard en tiempo real mientras el usuario navega
            const pollInterval = setInterval(fetchData, 3000);

            fetch('/api/update', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                clearInterval(pollInterval);
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-arrows-rotate"></i> Actualizar Ahora`;
                
                if (data.success) {
                    showToast(`Actualización completada. Se extrajeron ${data.count} mensajes.`, 'success');
                    fetchData(); // Recarga final
                } else {
                    showToast('Error al actualizar: ' + data.error, 'error');
                }
            })
            .catch(err => {
                clearInterval(pollInterval);
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-arrows-rotate"></i> Actualizar Ahora`;
                showToast('Error de red al intentar actualizar', 'error');
            });
        }

        // Update Chart.js rendering
        function updateChart(messages) {
            const counts = {};
            globalCategories.forEach(cat => {
                counts[cat] = 0;
            });
            if (counts["Otros"] === undefined) {
                counts["Otros"] = 0;
            }

            messages.forEach(m => {
                if (counts[m.category] !== undefined) {
                    counts[m.category]++;
                } else {
                    counts["Otros"]++;
                }
            });

            const labels = Object.keys(counts);
            const values = Object.values(counts);

            // Generar colores premium usando HSL de forma dinámica
            const backgroundColors = [];
            const borderColors = [];
            
            labels.forEach((label, idx) => {
                if (label === "Otros") {
                    backgroundColors.push('rgba(149, 165, 166, 0.7)'); // Gris neutral
                    borderColors.push('#95a5a6');
                } else {
                    const hue = (idx * (360 / (labels.length - 1 || 1))) % 360;
                    backgroundColors.push(`hsla(${hue}, 70%, 50%, 0.7)`);
                    borderColors.push(`hsl(${hue}, 70%, 50%)`);
                }
            });

            if (categoryChart) {
                categoryChart.destroy();
            }

            const ctx = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#ffffff',
                                font: {
                                    family: 'Outfit',
                                    size: 10
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
